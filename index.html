    <style>
        body { background: #000; color: white; font-family: Arial, sans-serif; margin: 0; overflow: hidden; display: flex; }
        
        .main-content { position: relative; flex-grow: 1; height: 100vh; transition: 0.3s; }
        .video-wrapper { position: relative; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #sidebar { 
            width: 0; background: #111; height: 100vh; overflow-y: auto; 
            transition: 0.3s; border-left: 0px solid #444; display: flex; flex-direction: column; z-index: 200;
        }
        #sidebar.aberto { width: 320px; border-left: 2px solid #e60000; }
        
        .lista-header { padding: 20px; background: #e60000; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 10; }

        .canal-item { 
            padding: 12px 15px; border-bottom: 1px solid #222; cursor: pointer; 
            font-size: 0.85rem; color: #ccc; transition: 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .canal-item:hover { background: #333; color: #fff; }
        .canal-item.ativo { background: #222; color: #e60000; font-weight: bold; border-left: 5px solid #e60000; }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; 
        }
        
        #grid-filmes {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; padding: 40px; box-sizing: border-box; overflow-y: auto;
        }
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; max-width: 1000px; margin: 0 auto;
        }
        .card-filme {
            background: #1a1a1a; color: white; padding: 20px 10px; text-align: center;
            text-decoration: none; border-radius: 8px; border: 1px solid #333;
            font-weight: bold; font-size: 0.8rem; transition: 0.3s; text-transform: uppercase;
        }
        .card-filme:hover { background: #e60000; border-color: white; transform: translateY(-5px); }

        .btn-start { 
            padding: 20px; font-size: 1.1rem; cursor: pointer; 
            background: #e60000; color: white; border: none; border-radius: 8px; font-weight: bold;
        }

        .controles {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; transition: 0.3s; opacity: 0; pointer-events: none;
        }
        .controles.ativo { opacity: 1; pointer-events: auto; }
        
        .btn-nav { 
            background: rgba(0,0,0,0.9); border: 1px solid white; color: white; 
            padding: 12px 18px; cursor: pointer; border-radius: 5px; font-weight: bold; 
            display: flex; align-items: center; justify-content: center;
        }
        
        #click-catcher { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
    </style>
</head>

let listaAtual = [];
let indexAtual = 0;
let timerControles;
let timerSidebar;

function iniciarFluxo(categoria) {
    document.getElementById('start-screen').style.display = 'none';
    listaAtual = listas[categoria];
    document.getElementById('sidebar-titulo').innerText = categoria.toUpperCase();
    indexAtual = 0;
    montarListaLateral();
    carregarCanais();
}

function abrirGridFilmes() {
    const container = document.getElementById('grid-container-mais');
    container.innerHTML = "";
    listas.mais_filmes.forEach(url => {
        let canal = "CANAL";
        if(url.includes('canal=')) canal = url.split('canal=')[1];
        const a = document.createElement('a');
        a.className = 'card-filme';
        a.href = url;
        a.target = "_blank";
        a.innerText = canal.replace('_', ' ');
        container.appendChild(a);
    });
    document.getElementById('grid-filmes').style.display = 'block';
}

function fecharGridFilmes() {
    document.getElementById('grid-filmes').style.display = 'none';
}

function carregarCanais() {
    const player = document.getElementById('main-player');
    if (listaAtual.length > 0) {
        player.src = listaAtual[indexAtual];
        marcarAtivoNaLista();
    }
}

function mudarCanal(direcao) {
    if (listaAtual.length === 0) return;
    indexAtual = (indexAtual + direcao + listaAtual.length) % listaAtual.length;
    carregarCanais();
}

function montarListaLateral() {
    const container = document.getElementById('lista-canais-container');
    container.innerHTML = "";
    listaAtual.forEach((url, i) => {
        let nomeRaw = "Canal";
        if(url.includes('canal=')) {
            nomeRaw = url.split('canal=')[1];
        } else if(url.includes('id=')) {
            nomeRaw = url.split('id=')[1];
        } else {
            nomeRaw = url.split('/').pop();
        }
        
        const div = document.createElement('div');
        div.className = 'canal-item';
        div.id = 'item-' + i;
        div.innerText = `${i + 1}. ${nomeRaw.toUpperCase().replace('.PHP', '')}`;
        div.onclick = (e) => {
            e.stopPropagation();
            indexAtual = i;
            carregarCanais();
            resetarTimerSidebar();
        };
        container.appendChild(div);
    });
}

function marcarAtivoNaLista() {
    document.querySelectorAll('.canal-item').forEach(el => el.classList.remove('ativo'));
    const ativo = document.getElementById('item-' + indexAtual);
    if(ativo) {
        ativo.classList.add('ativo');
        ativo.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    sb.classList.toggle('aberto');
    if(sb.classList.contains('aberto')) resetarTimerSidebar();
}

function resetarTimerSidebar() {
    clearTimeout(timerSidebar);
    const sb = document.getElementById('sidebar');
    if(sb.classList.contains('aberto')) {
        timerSidebar = setTimeout(() => sb.classList.remove('aberto'), 30000);
    }
}

function voltarHome() {
    document.getElementById('sidebar').classList.remove('aberto');
    fecharGridFilmes();
    document.getElementById('main-player').src = "";
    document.getElementById('start-screen').style.display = 'flex';
}

function toggleMenu() {
    const ctrls = document.getElementById('ctrls');
    const catcher = document.getElementById('click-catcher');
    ctrls.classList.add('ativo');
    catcher.style.display = 'none';
    clearTimeout(timerControles);
    timerControles = setTimeout(() => {
        ctrls.classList.remove('ativo');
        catcher.style.display = 'block';
    }, 10000);
}
</script>
