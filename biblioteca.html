<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes Pro</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; }
        #catalog-screen { padding: 40px 20px; background: linear-gradient(to bottom, #1a0000 0%, #000 400px); min-height: 100vh; }
        
        .header-logo { text-align: center; margin-bottom: 30px; }
        .header-logo h1 { font-size: 3rem; margin: 0; letter-spacing: 2px; }
        .header-logo span { color: #e60000; }

        .filter-container {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .filter-container input, .filter-container select {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            min-width: 160px;
            font-size: 0.9rem;
        }
        .filter-container input:focus { border-color: #e60000; }

        /* Estilo para os Títulos de Seção */
        .secao-titulo { 
            grid-column: 1 / -1; 
            color: #e60000; 
            font-size: 1.8rem; 
            margin: 30px 0 15px 0; 
            border-bottom: 2px solid #e60000; 
            display: inline-block;
            padding-bottom: 5px;
        }

        .grid-filmes { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .card-filme { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 2px solid #222; position: relative; }
        .card-filme:hover { transform: scale(1.06); border-color: #e60000; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-filme img { width: 100%; height: 260px; object-fit: cover; display: block; background: #222; }
        .card-filme .info { padding: 12px; text-align: center; }
        .card-filme h3 { font-size: 0.85rem; margin: 0 0 5px 0; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-filme p { font-size: 0.75rem; color: #888; margin: 0; }

        #player-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 2000; }
        .video-container { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        #top-navigation { position: absolute; top: 0; left: 0; width: 100%; height: 100px; z-index: 2100; display: flex; align-items: center; padding: 0 30px; pointer-events: none; }
        .btn-voltar { background: rgba(230,0,0,0.9); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; pointer-events: auto; opacity: 0; transition: 0.4s; }
        #player-screen:hover .btn-voltar { opacity: 1; }
    </style>
</head>

const catalogScreen = document.getElementById('catalog-screen');
const playerScreen = document.getElementById('player-screen');
const mainPlayer = document.getElementById('main-player');
const grid = document.getElementById('lista-filmes');

function renderizar(lista) {
    grid.innerHTML = "";
    if (lista.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 50px; color:#666;">Nenhum filme encontrado.</div>`;
        return;
    }

    // Separa os filmes normais dos filmes da redecanais
    const normais = lista.filter(f => !f.u.includes("redecanais"));
    const redecanais = lista.filter(f => f.u.includes("redecanais"));

    // Renderiza Filmes Normais
    normais.forEach(f => criarCard(f));

    // Adiciona Título Redecanais se houver filmes dela
    if (redecanais.length > 0) {
        const titleDiv = document.createElement('h2');
        titleDiv.className = 'secao-titulo';
        titleDiv.innerText = 'Redecanais';
        grid.appendChild(titleDiv);
        
        redecanais.forEach(f => criarCard(f));
    }
}

// Função auxiliar para criar o card e adicionar o atributo title (nome completo no mouse)
function criarCard(filme) {
    const card = document.createElement('div');
    card.className = 'card-filme';
    // O atributo title="full name" faz o nome aparecer ao passar o mouse
    card.setAttribute('title', filme.t); 
    
    card.innerHTML = `
        <img src="${filme.capa}" alt="${filme.t}" onerror="this.src='https://via.placeholder.com/300x450/111/fff?text=Sem+Capa'">
        <div class="info">
            <h3>${filme.t}</h3>
            <p>${filme.a} | ${filme.g}</p>
        </div>`;
    card.onclick = () => abrirPlayer(filme.u);
    grid.appendChild(card);
}

function filtrar() {
    const termo = document.getElementById('search-input').value.toLowerCase();
    const genero = document.getElementById('select-genero').value;
    const colecao = document.getElementById('select-colecao').value;
    const anoSel = document.getElementById('select-ano').value;

    const filtrados = filmes.filter(f => {
        const matchTitulo = f.t.toLowerCase().includes(termo);
        const matchGenero = genero === "" || f.g === genero;
        const matchColecao = colecao === "" || f.c === colecao;
        
        let matchAno = true;
        if (anoSel === "Antigos") {
            matchAno = f.a < 1980;
        } else if (anoSel.includes("-")) {
            const [inicio, fim] = anoSel.split("-").map(Number);
            matchAno = f.a >= inicio && f.a <= fim;
        } else if (anoSel !== "") {
            matchAno = f.a == Number(anoSel);
        }

        return matchTitulo && matchGenero && matchColecao && matchAno;
    });

    renderizar(filtrados);
}

function abrirPlayer(url) {
    // Lista de domínios que devem abrir em uma janela Pop-up
    const abrirNoPopup = url.includes("redecanais") || 
                         url.includes("youtube.com") || 
                         url.includes("youtu.be") || 
                         url.includes("tokyvideo.com");

    if (abrirNoPopup) {
        // Configurações da janela Pop-up
        const w = 1000, h = 600;
        const l = (screen.width - w) / 2;
        const t = (screen.height - h) / 2;
        
        window.open(url, 'Player_Filme', `width=${w},height=${h},top=${t},left=${l},scrollbars=no,resizable=yes`);
    } else {
        // Comportamento padrão: abrir no iframe interno da página
        catalogScreen.style.display = 'none';
        playerScreen.style.display = 'block';
        mainPlayer.src = url;
    }
}

function fecharPlayer() {
    mainPlayer.src = "";
    playerScreen.style.display = 'none';
    catalogScreen.style.display = 'block';
}

renderizar(filmes);
</script>
