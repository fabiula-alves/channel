<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes Pro</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        #catalog-screen { padding: 40px 20px; background: linear-gradient(to bottom, #1a0000 0%, #000 400px); min-height: 100vh; }
        
        .header-logo { text-align: center; margin-bottom: 30px; }
        .header-logo h1 { font-size: 3rem; margin: 0; letter-spacing: 2px; }
        .header-logo span { color: #e60000; }

        .filter-container {
            max-width: 1200px; margin: 0 auto 40px auto; display: flex; flex-wrap: wrap;
            gap: 12px; justify-content: center; background: rgba(255, 255, 255, 0.05);
            padding: 20px; border-radius: 12px; border: 1px solid #333; align-items: center;
        }
        .filter-container input, .filter-container select, .btn-nav {
            background: #222; color: #fff; border: 1px solid #444; padding: 12px;
            border-radius: 6px; outline: none; min-width: 140px; font-size: 0.9rem; cursor: pointer;
        }
        .btn-home { min-width: 50px !important; font-size: 1.2rem; }

        .secao-titulo { 
            grid-column: 1 / -1; color: #e60000; font-size: 1.5rem; 
            margin: 40px 0 15px 0; border-left: 5px solid #e60000; padding-left: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .grid-filmes { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .card-filme { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 2px solid #222; position: relative; }
        .card-filme:hover { transform: scale(1.06); border-color: #e60000; z-index: 10; }
        .card-filme img { width: 100%; height: 260px; object-fit: cover; }
        .card-filme .info { padding: 12px; text-align: center; }
        .card-filme h3 { font-size: 0.85rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .scroll-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            background: #e60000; color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="catalog-screen">
    <div class="header-logo"><h1>Lista de <span>Filmes</span></h1></div>
    <div class="filter-container">
        <button class="btn-nav btn-home" onclick="window.location.href='index.html'">🏠</button>
        <button class="btn-nav" id="btn-toggle-modo" onclick="alternarModo()">🎬 Todos Filmes</button>
        <input type="text" id="search-input" placeholder="Buscar por nome..." oninput="filtrar()">
        
        <select id="select-genero" onchange="filtrar()">
            <option value="">Todos os Gêneros</option>
            <option value="Ação">Ação</option>
            <option value="Animação">Animação</option>
            <option value="Comédia">Comédia</option>
            <option value="Drama">Drama</option>
            <option value="Terror">Terror</option>
            <option value="Suspense">Suspense</option>
            <option value="Ficção">Ficção Científica</option>
        </select>

        <select id="select-colecao" onchange="filtrar()">
            <option value="">Todas as Coleções</option>
            <option value="Missão Impossível">Missão Impossível</option>
            <option value="Lego">Lego</option>
            <option value="A Múmia">A Múmia</option>
            <option value="Scooby-Doo">Scooby-Doo</option>
        </select>

        <select id="select-ano" onchange="filtrar()">
            <option value="">Todos os Anos</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2010-2019">2010 a 2019</option>
            <option value="2000-2009">2000 a 2009</option>
            <option value="1990-1999">Anos 90</option>
            <option value="1980-1989">Anos 80</option>
            <option value="Antigos">Mais antigos</option>
        </select>
    </div>
    <div class="grid-filmes" id="lista-filmes"></div>
</div>

<button class="scroll-btn" onclick="navegarPagina()" id="scrollBtn">▼</button>

let modoRedecanais = true;
const grid = document.getElementById('lista-filmes');

function renderizar(lista) {
    grid.innerHTML = "";
    
    // Filtro de Origem (Botão alternar)
    const filtradosPorOrigem = modoRedecanais 
        ? lista.filter(f => f.u.includes("redecanais")) 
        : lista.filter(f => !f.u.includes("redecanais"));

    const categorias = {
        "Redecanais": filtradosPorOrigem.filter(f => f.u.includes("redecanais")),
        "Dailymotion": filtradosPorOrigem.filter(f => f.u.includes("dailymotion")),
        "TokyVideo": filtradosPorOrigem.filter(f => f.u.includes("tokyvideo")),
        "OK.ru": filtradosPorOrigem.filter(f => f.u.includes("ok.ru")),
        "YouTube": filtradosPorOrigem.filter(f => f.u.includes("youtu"))
    };

    Object.keys(categorias).forEach(cat => {
        if (categorias[cat].length > 0) {
            const h2 = document.createElement('h2');
            h2.className = 'secao-titulo';
            h2.innerText = cat;
            grid.appendChild(h2);
            categorias[cat].forEach(f => criarCard(f));
        }
    });
}

function criarCard(filme) {
    const card = document.createElement('div');
    card.className = 'card-filme';
    card.innerHTML = `<img src="${filme.capa}" loading="lazy"><div class="info"><h3>${filme.t}</h3><p>${filme.a}</p></div>`;
    card.onclick = () => abrirPlayer(filme.u);
    grid.appendChild(card);
}

function alternarModo() {
    modoRedecanais = !modoRedecanais;
    document.getElementById('btn-toggle-modo').innerText = modoRedecanais ? "🎬 Todos Filmes" : "🎬 Só Redecanais";
    filtrar();
}

function filtrar() {
    const termo = document.getElementById('search-input').value.toLowerCase();
    const genero = document.getElementById('select-genero').value;
    const colecao = document.getElementById('select-colecao').value;
    const anoSel = document.getElementById('select-ano').value;

    const filtrados = filmes.filter(f => {
        const matchTitulo = f.t.toLowerCase().includes(termo);
        const matchGenero = genero === "" || f.g === genero;
        const matchColecao = colecao === "" || f.c === colecao;
        
        let matchAno = true;
        if (anoSel !== "") {
            if (anoSel.includes("-")) {
                const [inicio, fim] = anoSel.split("-").map(Number);
                matchAno = f.a >= inicio && f.a <= fim;
            } else if (anoSel === "Antigos") {
                matchAno = f.a < 1980;
            } else {
                matchAno = f.a === Number(anoSel);
            }
        }

        return matchTitulo && matchGenero && matchColecao && matchAno;
    });
    renderizar(filtrados);
}

function abrirPlayer(url) {
    const w = 1100, h = 650;
    const l = (screen.width - w) / 2;
    const t = (screen.height - h) / 2;
    window.open(url, 'Player_Filme', `width=${w},height=${h},top=${t},left=${l},scrollbars=no`);
}

function navegarPagina() {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 10) {
        window.scrollTo(0, 0);
    } else {
        window.scrollBy(0, window.innerHeight * 0.8);
    }
}

window.onscroll = function() {
    const btn = document.getElementById('scrollBtn');
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 10) {
        btn.innerText = "▲";
    } else {
        btn.innerText = "▼";
    }
};

renderizar(filmes);
